<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete your profile</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #dce8f5;
    --card: #ffffff;
    --primary: #4a6fa5;
    --primary-dark: #3a5a8a;
    --primary-light: #e8f0fb;
    --text: #2c3e6b;
    --text-muted: #7a8cb0;
    --border: #c5d5ea;
    --input-bg: #ffffff;
    --section-line: #b0c4de;
    --radius: 12px;
    --shadow: 0 8px 40px rgba(74,111,165,0.13);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .card {
    background: var(--card);
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 48px 52px;
    width: 100%;
    max-width: 780px;
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 36px;
    letter-spacing: -0.3px;
  }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .section-header::before,
  .section-header::after {
    content: '';
    flex: 1;
    height: 1.5px;
    background: var(--section-line);
  }
  .section-header span {
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
    white-space: nowrap;
  }

  /* ── GRID ── */
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .grid-2-1 { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; margin-bottom: 20px; }
  .col-span-2 { grid-column: span 2; }

  /* ── FIELD ── */
  .field {
    position: relative;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 44px 10px 16px;
    background: var(--input-bg);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(74,111,165,0.1);
  }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .field input,
  .field select {
    width: 100%;
    border: none;
    outline: none;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    background: transparent;
    appearance: none;
    -webkit-appearance: none;
  }
  .field select option { font-weight: 500; }
  .field input::placeholder { color: var(--text-muted); font-weight: 500; }
  .field .icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    display: flex;
    align-items: center;
  }
  .field .icon svg { width: 18px; height: 18px; }

  /* upload field */
  .field.upload { cursor: pointer; }
  .field.upload input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
  }
  .field.upload .upload-text { font-size: 13px; color: var(--text-muted); font-weight: 500; }

  /* section spacing */
  .section { margin-bottom: 8px; }
  .section + .section { margin-top: 12px; }

  /* ── BUTTON ── */
  .btn-wrap { margin-top: 32px; display: flex; justify-content: center; }
  button[type="submit"] {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 15px 64px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(74,111,165,0.3);
  }
  button[type="submit"]:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(74,111,165,0.4);
  }
  button[type="submit"]:active { transform: translateY(0); }

  @media (max-width: 620px) {
    .card { padding: 32px 20px; }
    .grid-3, .grid-2, .grid-2-1 { grid-template-columns: 1fr; }
    .col-span-2 { grid-column: span 1; }
  }
</style>
</head>
<body>

<div class="card">
  <h1>Complete your profile</h1>

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <!-- Personal Information -->
    <div class="section">
      <div class="section-header"><span>Personal Information</span></div>

      <div class="grid-3">

        <div class="field">
          <label>Sex</label>
          <select name="sex">
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </span>
        </div>

        <div class="field">
          <label>Birth Date</label>
          <input type="date" name="date_of_birth">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </span>
        </div>

        <div class="field">
          <label>Phone Number</label>
          <input type="tel" name="phone" placeholder="0555 000 000">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.82 19.79 19.79 0 01.02 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
            </svg>
          </span>
        </div>

      </div>

      <div class="grid-2">

        <div class="field">
          <label>ID Card Number</label>
          <input type="text" name="id_card_number" placeholder="Enter your national ID">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
        </div>

        <div class="field upload">
          <label>ID Card Photo</label>
          <span class="upload-text">Upload your ID Card photo</span>
          <input type="file" name="id_card_photo" accept="image/*">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="16 16 12 12 8 16"/>
              <line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
            </svg>
          </span>
        </div>

      </div>
    </div>

    <!-- Residential Address -->
    <div class="section">
      <div class="section-header"><span>Residential Address</span></div>

      <div class="grid-2">

        <div class="field">
          <label>Address</label>
          <input type="text" name="address" placeholder="Street, building...">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </span>
        </div>

        <div class="field">
          <label>Postal Code</label>
          <input type="text" name="postal_code" placeholder="16000">
        </div>

      </div>

      <div class="grid-2-1">

        <div class="field">
          <label>City</label>
          <input type="text" name="city" placeholder="Rouiba">
        </div>

        <div class="field">
          <label>Wilaya</label>
          <select name="wilaya">
            <option>Adrar</option><option>Chlef</option><option>Laghouat</option>
            <option>Oum El Bouaghi</option><option>Batna</option><option>Béjaïa</option>
            <option>Biskra</option><option>Béchar</option><option>Blida</option>
            <option>Bouira</option><option>Tamanrasset</option><option>Tébessa</option>
            <option>Tlemcen</option><option>Tiaret</option><option>Tizi Ouzou</option>
            <option selected>Algiers</option><option>Djelfa</option><option>Jijel</option>
            <option>Sétif</option><option>Saïda</option><option>Skikda</option>
            <option>Sidi Bel Abbès</option><option>Annaba</option><option>Guelma</option>
            <option>Constantine</option><option>Médéa</option><option>Mostaganem</option>
            <option>M'Sila</option><option>Mascara</option><option>Ouargla</option>
            <option>Oran</option><option>El Bayadh</option><option>Illizi</option>
            <option>Bordj Bou Arréridj</option><option>Boumerdès</option><option>El Tarf</option>
            <option>Tindouf</option><option>Tissemsilt</option><option>El Oued</option>
            <option>Khenchela</option><option>Souk Ahras</option><option>Tipaza</option>
            <option>Mila</option><option>Aïn Defla</option><option>Naâma</option>
            <option>Aïn Témouchent</option><option>Ghardaïa</option><option>Relizane</option>
          </select>
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </span>
        </div>

      </div>
    </div>

    <div class="btn-wrap">
      <button type="submit">Finalize registration</button>
    </div>

  </form>
</div>

</body>
</html>
